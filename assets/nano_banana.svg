<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="bananaGrad" x1="40" y1="200" x2="220" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFE55C"/>
    </linearGradient>
  </defs>
  
  <!-- Tech Circle Background (Optional, kept subtle) -->
  <circle cx="128" cy="128" r="120" stroke="#00FFFF" stroke-width="2" stroke-opacity="0.1" stroke-dasharray="10 5"/>
  <circle cx="128" cy="128" r="90" stroke="#00FFFF" stroke-width="1" stroke-opacity="0.1"/>

  <!-- The Nano Banana -->
  <g filter="url(#glow)">
    <path d="M60,200 C60,200 80,220 110,210 C160,190 200,100 210,60 C215,40 200,30 200,30 C200,30 190,40 185,60 C175,100 130,170 90,185 C70,192 60,200 60,200 Z" 
          fill="url(#bananaGrad)" stroke="#FFD700" stroke-width="4"/>
    
    <!-- Cybernetic/Nano Circuit Lines -->
    <path d="M100,180 L120,160 L140,160" stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
    <circle cx="140" cy="160" r="3" fill="#00FFFF"/>
    
    <path d="M130,130 L150,110 L150,90" stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
    <circle cx="150" cy="90" r="3" fill="#00FFFF"/>
    
    <path d="M160,80 L180,70" stroke="#00FFFF" stroke-width="3" stroke-linecap="round"/>
    <circle cx="180" cy="70" r="3" fill="#00FFFF"/>

    <!-- Nano Chip -->
    <rect x="115" y="115" width="20" height="20" rx="4" fill="#1a1a1a" stroke="#00FFFF" stroke-width="2"/>
    <path d="M120,125 L130,125" stroke="#00FFFF" stroke-width="2"/>
    <path d="M125,120 L125,130" stroke="#00FFFF" stroke-width="2"/>
  </g>
</svg>
