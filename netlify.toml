[build]
  # Tell Netlify where the website source code is
  base = "website/ttslanding/project"
  
  # The command to build the production files
  command = "npm run build"
  
  # Where the final built files are located relative to the base
  publish = "dist"

[build.environment]
  # Ensuring a modern Node version
  NODE_VERSION = "20"

[[redirects]]
  # This ensures React Router works correctly on Netlify
  from = "/*"
  to = "/index.html"
  status = 200
